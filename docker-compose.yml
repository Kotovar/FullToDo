services:
  postgres:
    # Официальный образ PostgreSQL версии 18.
    image: postgres:18

    # Имя контейнера. Удобно для команд: docker logs fulltodo-postgres
    container_name: fulltodo-postgres

    # Проброс порта: хост:контейнер
    # Например, если DB_PORT=5433 — снаружи обращаемся на 5433, внутри Postgres слушает 5432.
    # Убрать этот блок, если БД нужна только другим контейнерам (безопаснее).
    ports:
      - '${DB_PORT}:5432'

    # Переменные окружения — передаются внутрь контейнера.
    environment:
      POSTGRES_USER: '${DB_USER}'
      POSTGRES_PASSWORD: '${DB_PASSWORD}'
      POSTGRES_DB: '${DB_NAME}'

    # Монтирование тома: данные БД сохраняются между перезапусками контейнера.
    # Без этого все данные удалятся при docker compose down.
    # postgres_data — именованный том, описан в разделе volumes ниже.
    volumes:
      - postgres_data:/var/lib/postgresql

    # Безопасность: запускаем процесс от имени пользователя postgres (uid 999),
    # а не от root. Если контейнер взломают — не получат root-доступ к хосту.
    user: '999:999'

    # Запрещает процессам внутри контейнера повышать свои права
    # (например через sudo или setuid-бинари). Блокирует эскалацию привилегий.
    security_opt:
      - no-new-privileges:true

    # Монтирует временные директории в оперативную память (RAM), а не на диск.
    # /tmp — временные файлы (сортировка и т.д.)
    # /run/postgresql — unix-сокет для подключения к Postgres
    # Плюсы: быстрее + данные не остаются на хосте после остановки.
    tmpfs:
      - /tmp
      - /run/postgresql

    # Лимиты ресурсов — контейнер не сможет превысить эти значения.
    # Защищает хост от ситуации "один контейнер съел всю память/CPU".
    deploy:
      resources:
        limits:
          memory: 512m # максимум 512 МБ RAM
          cpus: '0.5' # максимум 50% одного ядра CPU

  redis:
    image: redis:8.6-trixie
    container_name: todo-redis
    ports:
      - '${REDIS_PORT}:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']

# Именованные тома — Docker сам управляет хранилищем на хосте.
# Данные сохраняются между перезапусками и не удаляются при docker compose down.
# Удалить том вручную: docker volume rm fulltodo_postgres_data
volumes:
  postgres_data:
  redis_data:
