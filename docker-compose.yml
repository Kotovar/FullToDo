services:
  postgres:
    image: postgres:18
    container_name: fulltodo-postgres
    ports:
      - '${DB_PORT}:5432'
    environment:
      POSTGRES_USER: '${DB_USER}'
      POSTGRES_PASSWORD: '${DB_PASSWORD}'
      POSTGRES_DB: '${DB_NAME}'
    volumes:
      - postgres_data:/var/lib/postgresql
    user: '999:999'
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run/postgresql
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  mongo:
    image: mongo:8
    container_name: fulltodo-mongo
    entrypoint: ['/usr/local/bin/fulltodo-mongo-entrypoint.sh']
    ports:
      - '${MONGO_PORT}:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: '${MONGO_USER}'
      MONGO_INITDB_ROOT_PASSWORD: '${MONGO_PASSWORD}'
      MONGO_INITDB_DATABASE: '${MONGO_DB}'
      MONGO_REPLICA_SET: '${MONGO_REPLICA_SET:-rs0}'
      MONGO_KEYFILE: '${MONGO_KEYFILE:-fulltodoLocalReplicaSetKey1234567890}'
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo/entrypoint.sh:/usr/local/bin/fulltodo-mongo-entrypoint.sh:ro
      - ./docker/mongo/init-replica-set.js:/docker-entrypoint-initdb.d/init-replica-set.js:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mongosh --quiet -u "$$MONGO_INITDB_ROOT_USERNAME" -p "$$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin --eval "db.adminCommand({ ping: 1 }).ok && rs.status().ok" | grep 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  redis:
    image: redis:8.6-trixie
    container_name: todo-redis
    ports:
      - '${REDIS_PORT}:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']

volumes:
  postgres_data:
  redis_data:
  mongo_data:
