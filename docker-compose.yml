services:
  postgres:
    image: postgres:18
    container_name: fulltodo-postgres
    ports:
      - '${DB_PORT}:5432'
    environment:
      POSTGRES_USER: '${DB_USER}'
      POSTGRES_PASSWORD: '${DB_PASSWORD}'
      POSTGRES_DB: '${DB_NAME}'
    volumes:
      - postgres_data:/var/lib/postgresql
    user: '999:999'
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run/postgresql
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  mongo:
    image: mongo:8
    container_name: fulltodo-mongo
    ports:
      - '${MONGO_PORT}:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: '${MONGO_USER}'
      MONGO_INITDB_ROOT_PASSWORD: '${MONGO_PASSWORD}'
      MONGO_INITDB_DATABASE: '${MONGO_DB}'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  redis:
    image: redis:8.6-trixie
    container_name: todo-redis
    ports:
      - '${REDIS_PORT}:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']

volumes:
  postgres_data:
  redis_data:
  mongo_data:
